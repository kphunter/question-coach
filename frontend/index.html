<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Question Coach</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="app-shell">
            <!-- ── TOP APP BAR ─────────────────────────────────────── -->
            <div class="app-bar">
                <div class="app-bar-leading">
                    <span class="material-symbols-rounded app-bar-icon"
                        >psychology_alt</span
                    >
                    <span class="app-bar-title">Question Coach</span>
                    <div class="status-dot" id="statusDot"></div>
                </div>
                <div class="app-bar-actions">
                    <button
                        class="icon-btn"
                        id="settingsBtn"
                        title="Settings"
                        onclick="toggleSettings()"
                    >
                        <span class="material-symbols-rounded">settings</span>
                    </button>
                    <div class="settings-panel" id="settingsPanel">
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label">
                                    AI Responses
                                </div>
                                <div class="settings-row-sub">
                                    Generate a response using Gemini
                                </div>
                            </div>
                            <label class="switch-label">
                                <div class="md-switch">
                                    <input
                                        type="checkbox"
                                        id="geminiToggle"
                                        checked
                                    />
                                    <div class="switch-track"></div>
                                    <div class="switch-thumb"></div>
                                </div>
                            </label>
                        </div>
                        <div class="settings-divider"></div>
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label">
                                    Search strategy
                                </div>
                                <div class="settings-row-sub">
                                    How the knowledge base is queried
                                </div>
                            </div>
                            <select class="md-select" id="searchStrategy">
                                <option value="auto">Auto</option>
                                <option value="semantic">Semantic</option>
                                <option value="exact">Exact</option>
                                <option value="hybrid_rrf">Hybrid</option>
                            </select>
                        </div>
                        <div class="settings-row">
                            <div>
                                <div class="settings-row-label">
                                    Sources returned
                                </div>
                                <div class="settings-row-sub">
                                    Number of knowledge base chunks
                                </div>
                            </div>
                            <select class="md-select" id="searchLimit">
                                <option value="3">3</option>
                                <option value="5" selected>5</option>
                                <option value="7">7</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── STAGE STEPPER ──────────────────────────────────── -->
            <div class="stage-stepper">
                <div class="stepper-track" id="stepperTrack"></div>
            </div>

            <!-- ── STAGE INFO PANEL ───────────────────────────────── -->
            <div class="stage-info">
                <div class="stage-info-body">
                    <div class="stage-info-heading" id="infoHeading"></div>
                    <div class="stage-info-text" id="infoText"></div>
                </div>
                <div class="stage-nav">
                    <button
                        class="md-text-btn"
                        id="prevBtn"
                        onclick="moveStage(-1)"
                    >
                        <span
                            class="material-symbols-rounded"
                            style="font-size: 16px"
                            >arrow_back</span
                        >
                        Back
                    </button>
                    <button
                        class="md-tonal-btn"
                        id="nextBtn"
                        onclick="moveStage(1)"
                    >
                        Next stage
                        <span
                            class="material-symbols-rounded"
                            style="font-size: 16px"
                            >arrow_forward</span
                        >
                    </button>
                </div>
            </div>

            <!-- ── CHAT AREA ──────────────────────────────────────── -->
            <div class="chat-area" id="chatArea"></div>

            <!-- ── STAGE PANEL ────────────────────────────────────── -->
            <div class="stage-panel" id="stagePanel"></div>

            <!-- ── INPUT AREA ─────────────────────────────────────── -->
            <div class="input-area">
                <div class="input-row">
                    <div class="input-field-wrap">
                        <textarea
                            class="md-textarea"
                            id="msgInput"
                            rows="1"
                            placeholder="Type your message…"
                        ></textarea>
                    </div>
                    <button class="send-fab" id="sendBtn" disabled title="Send">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>
                <div class="input-hint">
                    <span id="connStatus">Connecting…</span>
                    &nbsp;·&nbsp; Enter to send &nbsp;·&nbsp; Shift+Enter for
                    new line
                </div>
            </div>
        </div>

        <!-- ── SNACKBAR ─────────────────────────────────────────── -->
        <div class="snackbar" id="snackbar"></div>

        <script>
            /* ================================================================
   QFT STAGE DATA
================================================================ */
            const STAGES = [
                {
                    id: 1,
                    name: "Question Focus",
                    icon: "center_focus_strong",
                    heading: "Stage 1 · Question Focus",
                    description:
                        "You'll be given a prompt or stimulus that sparks curiosity — without dictating a direction.",
                    instruction:
                        "Let's start. Have you been given a question focus by your teacher, or do you need to develop one? Tell me about your topic or assignment.",
                    placeholder:
                        "Share your question focus or describe your assignment topic…",
                    component: "default",
                },
                {
                    id: 2,
                    name: "Produce Questions",
                    icon: "add_circle",
                    heading: "Stage 2 · Produce Questions",
                    description:
                        "Generate as many questions as possible. No judging, no stopping to answer — just write them all.",
                    instruction:
                        "Now let's generate questions. Ask as many as you can about your topic. Don't evaluate or answer them — just list them. When you're ready, submit your list and I'll respond.",
                    placeholder: "Add a question and press Enter…",
                    component: "question-list",
                },
                {
                    id: 3,
                    name: "Improve Questions",
                    icon: "tune",
                    heading: "Stage 3 · Improve Questions",
                    description:
                        "Categorize your questions as open or closed, then practise converting between the two types.",
                    instruction:
                        "Look at your list. Which questions are open (require explanation or discussion) and which are closed (yes/no or simple facts)? Share your list and let's work through them.",
                    placeholder:
                        "Paste your question list and describe how you'd categorize them…",
                    component: "default",
                },
                {
                    id: 4,
                    name: "Prioritize Questions",
                    icon: "filter_list",
                    heading: "Stage 4 · Prioritize Questions",
                    description:
                        "Select your top 3 questions based on criteria that matter most to your assignment.",
                    instruction:
                        "Time to narrow down. What criteria will you use to choose your top 3 questions? Have your teacher given you criteria, or will you decide? Share your thinking.",
                    placeholder:
                        "Describe your criteria and which questions you're prioritizing…",
                    component: "default",
                },
                {
                    id: 5,
                    name: "Next Steps",
                    icon: "rocket_launch",
                    heading: "Stage 5 · Discuss Next Steps",
                    description:
                        "Map out how your prioritized questions will guide your research, writing, or inquiry.",
                    instruction:
                        "You have your questions — now what? How will you use them? Tell me about the assignment ahead: is this a research paper, a literature review, problem framing, or something else?",
                    placeholder:
                        "Describe how your questions will shape your next steps…",
                    component: "default",
                },
                {
                    id: 6,
                    name: "Reflect",
                    icon: "self_improvement",
                    heading: "Stage 6 · Reflect",
                    description:
                        "Consider what you learned, how your thinking changed, and how you'll apply the QFT going forward.",
                    instruction:
                        "Let's close with reflection. What did you learn from this process? How did your thinking change? Compare the questions you started with to the ones you ended up prioritizing.",
                    placeholder:
                        "Share your reflections on the question formulation process…",
                    component: "default",
                },
            ];

            /* ================================================================
   STATE
================================================================ */
            const API =
                window.location.hostname === "localhost"
                    ? "http://localhost:8000"
                    : `${window.location.protocol}//${window.location.hostname}:8000`;

            let currentStage = 1;
            let isConnected = false;
            let isProcessing = false;

            // Persists across stages 2–4; seeded with one blank row on first entry
            let questions = [];

            // Map of stage id → system_prompt, populated from /stages
            const stagePrompts = {};

            /* ================================================================
   DOM REFS
================================================================ */
            const stagePanel = document.getElementById("stagePanel");
            const stepperTrack = document.getElementById("stepperTrack");
            const infoHeading = document.getElementById("infoHeading");
            const infoText = document.getElementById("infoText");
            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            const chatArea = document.getElementById("chatArea");
            const msgInput = document.getElementById("msgInput");
            const sendBtn = document.getElementById("sendBtn");
            const statusDot = document.getElementById("statusDot");
            const connStatus = document.getElementById("connStatus");
            const snackbar = document.getElementById("snackbar");
            const geminiToggle = document.getElementById("geminiToggle");
            const searchStrat = document.getElementById("searchStrategy");
            const searchLimit = document.getElementById("searchLimit");

            /* ================================================================
   STEPPER RENDERING
================================================================ */
            function renderStepper() {
                stepperTrack.innerHTML = "";
                STAGES.forEach((stage, i) => {
                    // connector before step (except first)
                    if (i > 0) {
                        const conn = document.createElement("div");
                        conn.className =
                            "step-connector" +
                            (i < currentStage ? " done" : "");
                        stepperTrack.appendChild(conn);
                    }

                    const step = document.createElement("div");
                    const state =
                        i + 1 < currentStage
                            ? "completed"
                            : i + 1 === currentStage
                              ? "active"
                              : "";
                    step.className = `stage-step ${state}`;
                    step.title = stage.name;
                    step.onclick = () => goToStage(i + 1);

                    const circle = document.createElement("div");
                    circle.className = "step-circle";
                    circle.innerHTML =
                        state === "completed"
                            ? '<span class="material-symbols-rounded" style="font-size:14px">check</span>'
                            : String(stage.id);

                    const label = document.createElement("div");
                    label.className = "step-label";
                    label.textContent = stage.name;

                    step.appendChild(circle);
                    step.appendChild(label);
                    stepperTrack.appendChild(step);
                });
            }

            /* ================================================================
   STAGE INFO PANEL
================================================================ */
            function renderInfoPanel() {
                const stage = STAGES[currentStage - 1];
                infoHeading.textContent = stage.heading;
                infoText.textContent = stage.description;
                prevBtn.disabled = currentStage === 1;
                nextBtn.textContent =
                    currentStage === STAGES.length ? "Finish ✓" : "";
                nextBtn.innerHTML =
                    currentStage === STAGES.length
                        ? 'Finish <span class="material-symbols-rounded" style="font-size:16px">check_circle</span>'
                        : 'Next stage <span class="material-symbols-rounded" style="font-size:16px">arrow_forward</span>';
                nextBtn.disabled = currentStage === STAGES.length;

                // Update textarea placeholder
                msgInput.placeholder = stage.placeholder;
            }

            /* ================================================================
   STAGE NAVIGATION
================================================================ */
            function goToStage(n) {
                if (n < 1 || n > STAGES.length || n === currentStage) return;
                const dir = n > currentStage ? 1 : -1;
                const prev = currentStage;
                currentStage = n;
                renderStepper();
                renderInfoPanel();
                renderStagePanel();
                updateInputVisibility();
                addStageMarker(STAGES[currentStage - 1], prev, dir);
                addCoachMessage(STAGES[currentStage - 1].instruction);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            function moveStage(dir) {
                goToStage(currentStage + dir);
            }

            // Show/hide the default textarea and update send button label
            function updateInputVisibility() {
                const stage = STAGES[currentStage - 1];
                const isQL = stage.component === "question-list";
                msgInput.closest(".input-field-wrap").style.display = isQL
                    ? "none"
                    : "";
                sendBtn.title = isQL ? "Submit questions" : "Send";
            }

            /* ================================================================
   STAGE PANEL — per-stage UI mounted between chat and input
================================================================ */
            function renderStagePanel() {
                const stage = STAGES[currentStage - 1];
                stagePanel.innerHTML = "";

                if (stage.component === "question-list") {
                    // Seed one blank row if list is empty on entry
                    if (questions.length === 0) questions = [""];
                    stagePanel.appendChild(buildQuestionList());
                }
                // 'default' component: panel stays empty, normal textarea is used
            }

            function buildQuestionList() {
                const wrap = document.createElement("div");
                wrap.className = "ql-wrap";

                const header = document.createElement("div");
                header.className = "ql-header";
                header.innerHTML = `
                    <span class="ql-title">Your questions</span>
                    <span class="ql-count" id="qlCount">${questions.length} question${questions.length !== 1 ? "s" : ""}</span>
                `;
                wrap.appendChild(header);

                const list = document.createElement("ul");
                list.className = "ql-list";
                list.id = "qlList";

                function renderItems() {
                    list.innerHTML = "";
                    questions.forEach((q, i) => {
                        const li = document.createElement("li");
                        li.className = "ql-item";

                        const num = document.createElement("span");
                        num.className = "ql-num";
                        num.textContent = i + 1;

                        const input = document.createElement("input");
                        input.type = "text";
                        input.className = "ql-input";
                        input.value = q;
                        input.placeholder = "Your question…";
                        input.addEventListener("input", () => {
                            questions[i] = input.value;
                            updateCount();
                        });
                        // Enter on an existing row adds a new row below it
                        input.addEventListener("keydown", (e) => {
                            if (e.key === "Enter") {
                                e.preventDefault();
                                questions.splice(i + 1, 0, "");
                                renderItems();
                                // Focus the new row
                                const inputs =
                                    list.querySelectorAll(".ql-input");
                                if (inputs[i + 1]) inputs[i + 1].focus();
                            }
                            if (
                                e.key === "Backspace" &&
                                input.value === "" &&
                                questions.length > 1
                            ) {
                                e.preventDefault();
                                questions.splice(i, 1);
                                renderItems();
                                const inputs =
                                    list.querySelectorAll(".ql-input");
                                if (inputs[Math.max(0, i - 1)])
                                    inputs[Math.max(0, i - 1)].focus();
                            }
                        });

                        const del = document.createElement("button");
                        del.className = "ql-del";
                        del.title = "Remove";
                        del.innerHTML =
                            '<span class="material-symbols-rounded">close</span>';
                        del.addEventListener("click", () => {
                            if (questions.length > 1) {
                                questions.splice(i, 1);
                                renderItems();
                            }
                        });

                        li.appendChild(num);
                        li.appendChild(input);
                        li.appendChild(del);
                        list.appendChild(li);
                    });

                    updateCount();
                }

                function updateCount() {
                    const filled = questions.filter((q) => q.trim()).length;
                    const el = document.getElementById("qlCount");
                    if (el)
                        el.textContent = `${filled} question${filled !== 1 ? "s" : ""}`;
                }

                renderItems();
                wrap.appendChild(list);

                const addBtn = document.createElement("button");
                addBtn.className = "ql-add-btn";
                addBtn.innerHTML =
                    '<span class="material-symbols-rounded">add</span> Add question';
                addBtn.addEventListener("click", () => {
                    questions.push("");
                    renderItems();
                    const inputs = list.querySelectorAll(".ql-input");
                    if (inputs[inputs.length - 1])
                        inputs[inputs.length - 1].focus();
                });
                wrap.appendChild(addBtn);

                return wrap;
            }

            // Serialize the question list to a plain-text string for the chat API
            function serializeQuestions() {
                return questions
                    .map((q) => q.trim())
                    .filter(Boolean)
                    .map((q, i) => `${i + 1}. ${q}`)
                    .join("\n");
            }

            /* ================================================================
   CHAT HELPERS
================================================================ */
            function addWelcomeCard() {
                const card = document.createElement("div");
                card.className = "welcome-card";
                card.id = "welcomeCard";
                card.innerHTML = `
        <div class="material-symbols-rounded welcome-icon">psychology_alt</div>
        <h2>Welcome to Question Coach</h2>
        <p>I'll guide you through the six stages of the Question Formulation Technique (QFT) — a structured process for generating, refining, and prioritising your own research questions.</p>
    `;
                chatArea.appendChild(card);
            }

            function addStageMarker(stage, fromStage, dir) {
                const el = document.createElement("div");
                el.className = "stage-marker";
                el.innerHTML = `
        <span class="material-symbols-rounded">${dir > 0 ? "arrow_forward" : "arrow_back"}</span>
        <span class="stage-marker-text">${dir > 0 ? "Moving to" : "Back to"} ${stage.heading}</span>
    `;
                chatArea.appendChild(el);
            }

            function addCoachMessage(text) {
                addMessage("assistant", text, null, true);
            }

            function addMessage(role, text, sources = null, isCoach = false) {
                const row = document.createElement("div");
                row.className = `msg-row ${role}`;

                const avatar = document.createElement("div");
                avatar.className = `msg-avatar ${role}`;
                avatar.textContent = role === "user" ? "You" : "QC";

                const body = document.createElement("div");
                body.className = "msg-body";

                const bubble = document.createElement("div");
                bubble.className = "msg-bubble";
                bubble.textContent = text;

                body.appendChild(bubble);

                if (sources && sources.length > 0) {
                    const chips = document.createElement("div");
                    chips.className = "source-chips";
                    sources.forEach((s) => {
                        const chip = document.createElement("a");
                        chip.className = "source-chip";
                        chip.href = s.url || "#";
                        chip.target = "_blank";
                        chip.rel = "noopener";
                        chip.innerHTML = `<span class="material-symbols-rounded">description</span>${s.title || "Source"} (${s.score.toFixed(2)})`;
                        chips.appendChild(chip);
                    });
                    body.appendChild(chips);
                }

                const time = document.createElement("div");
                time.className = "msg-time";
                time.textContent = new Date().toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit",
                });
                body.appendChild(time);

                row.appendChild(avatar);
                row.appendChild(body);
                chatArea.appendChild(row);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            function showTyping() {
                const id = "typing-" + Date.now();
                const row = document.createElement("div");
                row.className = "msg-row assistant";
                row.id = id;

                const avatar = document.createElement("div");
                avatar.className = "msg-avatar assistant";
                avatar.textContent = "QC";

                const body = document.createElement("div");
                body.className = "msg-body";

                const bubble = document.createElement("div");
                bubble.className = "typing-bubble";
                bubble.innerHTML =
                    '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';

                body.appendChild(bubble);
                row.appendChild(avatar);
                row.appendChild(body);
                chatArea.appendChild(row);
                chatArea.scrollTop = chatArea.scrollHeight;
                return id;
            }

            function removeTyping(id) {
                const el = document.getElementById(id);
                if (el) el.remove();
            }

            /* ================================================================
   SEND
================================================================ */
            async function handleSend() {
                const stage = STAGES[currentStage - 1];
                let text, displayText;

                if (stage.component === "question-list") {
                    text = serializeQuestions();
                    displayText = text;
                    if (!text) {
                        showSnackbar("Add at least one question first.");
                        return;
                    }
                } else {
                    text = msgInput.value.trim();
                    displayText = text;
                    if (!text) return;
                    msgInput.value = "";
                    msgInput.style.height = "auto";
                }

                if (isProcessing || !isConnected) return;

                // Remove welcome card on first send
                const wc = document.getElementById("welcomeCard");
                if (wc) wc.remove();

                // Prepend stage context so the API knows which stage we're in
                const contextualMsg = `[QFT ${stage.heading}]\n\n${text}`;

                addMessage("user", displayText);
                const typingId = showTyping();

                isProcessing = true;
                sendBtn.disabled = true;
                msgInput.disabled = true;

                try {
                    const payload = {
                        message: contextualMsg,
                        search_limit: parseInt(searchLimit.value),
                        search_strategy: searchStrat.value,
                        use_gemini: geminiToggle.checked,
                        gemini_model: "gemini-2.5-flash",
                    };
                    const stagePrompt = stagePrompts[currentStage] || null;
                    payload.system_prompt = stagePrompt;

                    const res = await fetch(`${API}/chat`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || "Request failed");
                    }

                    const data = await res.json();
                    removeTyping(typingId);
                    addMessage("assistant", data.response, data.sources);
                } catch (err) {
                    console.error(err);
                    removeTyping(typingId);
                    addMessage(
                        "assistant",
                        `Sorry, I ran into an error: ${err.message}`,
                    );
                    showSnackbar(err.message);
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = !isConnected;
                    msgInput.disabled = false;
                    msgInput.focus();
                }
            }

            /* ================================================================
   STAGE PROMPTS — fetched from API
================================================================ */
            async function fetchStages() {
                try {
                    const res = await fetch(`${API}/stages`);
                    if (!res.ok) return;
                    const stages = await res.json();
                    stages.forEach((s) => {
                        if (s.id && s.system_prompt)
                            stagePrompts[s.id] = s.system_prompt;
                    });
                } catch {
                    // Non-fatal — falls back to no system prompt
                }
            }

            /* ================================================================
   HEALTH CHECK
================================================================ */
            async function checkHealth() {
                try {
                    const res = await fetch(`${API}/health`);
                    const data = await res.json();
                    setConnected(
                        data.status === "healthy" || data.status === "degraded",
                        data,
                    );
                } catch {
                    setConnected(false);
                }
            }

            function setConnected(ok, data = null) {
                isConnected = ok;
                statusDot.classList.toggle("connected", ok);
                sendBtn.disabled = !ok || isProcessing;

                if (ok) {
                    const count = data?.collection_count;
                    connStatus.textContent =
                        count != null
                            ? `Connected · ${count} vectors indexed`
                            : "Connected";
                } else {
                    connStatus.textContent = "Disconnected — check API server";
                    showSnackbar("Cannot connect to API server.");
                }
            }

            /* ================================================================
   SNACKBAR
================================================================ */
            let snackTimer;
            function showSnackbar(msg) {
                snackbar.textContent = msg;
                snackbar.classList.add("show");
                clearTimeout(snackTimer);
                snackTimer = setTimeout(
                    () => snackbar.classList.remove("show"),
                    4000,
                );
            }

            /* ================================================================
   SETTINGS PANEL
================================================================ */
            const settingsBtn = document.getElementById("settingsBtn");
            const settingsPanel = document.getElementById("settingsPanel");

            function toggleSettings() {
                const open = settingsPanel.classList.toggle("open");
                settingsBtn.classList.toggle("active", open);
            }

            document.addEventListener("click", (e) => {
                if (
                    !settingsBtn.contains(e.target) &&
                    !settingsPanel.contains(e.target)
                ) {
                    settingsPanel.classList.remove("open");
                    settingsBtn.classList.remove("active");
                }
            });

            /* ================================================================
   INIT
================================================================ */
            function init() {
                renderStepper();
                renderInfoPanel();
                renderStagePanel();
                updateInputVisibility();
                addWelcomeCard();
                addCoachMessage(STAGES[0].instruction);

                // Auto-resize textarea
                msgInput.addEventListener("input", function () {
                    this.style.height = "auto";
                    this.style.height = Math.min(this.scrollHeight, 130) + "px";
                });

                // Send on Enter (not Shift+Enter)
                msgInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                });

                sendBtn.addEventListener("click", handleSend);

                // Fetch stage prompts and health in parallel
                fetchStages();
                checkHealth();
                setInterval(() => {
                    if (!isConnected) checkHealth();
                }, 5000);
            }

            init();
        </script>
    </body>
</html>
