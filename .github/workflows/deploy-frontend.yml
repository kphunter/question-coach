name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend-react/**"
      - ".github/workflows/deploy-frontend.yml"

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed by peaceiris/actions-gh-pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-react

      - name: Build
        run: npm run build
        working-directory: frontend-react
        env:
          # Set in repo Settings → Secrets and variables → Actions → Variables
          # VITE_API_URL   : https://your-caddy-host (e.g. https://5-161-100-200.sslip.io)
          # VITE_BASE_PATH : /question-coach/  (repo name, with slashes)
          #                  Leave unset if this is a user/org pages repo (username.github.io)
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend-react/dist
