documents:
  folder_path: "./inputs/docs"
  # Additional folders to watch (relative to repo or absolute paths)
  additional_folders:
    - "./inputs/fetched"
  supported_extensions: [".md", ".html"]
  ignored_directories: [".obsidian", ".git", "__pycache__", "node_modules"]
  ignored_file_patterns: [".DS_Store", "Thumbs.db", ".last_incremental_run"]
  ignore_hidden_files: true
  chunk_size: 1000 # characters per chunk
  chunk_overlap: 200 # overlap between chunks for context continuity

embedding:
  provider: "gemini" # options: "gemini", "ollama", "sentence_transformers"
  # NOTE: switching providers changes vector dimensions — run `ingest clear-all` first
  timeout: 60
  ollama:
    model: "nomic-embed-text" # alternative: "mxbai-embed-large" (1024 dimensions)
    base_url: "http://localhost:11434"
  gemini:
    model: "gemini-embedding-001"
  sentence_transformers:
    model: "all-MiniLM-L6-v2" # alternative: "all-mpnet-base-v2" (768 dimensions, higher quality)
    device: "cpu" # options: "cpu", "cuda", "mps" (Apple Silicon)

llm:
  provider: "gemini" # options: "gemini", "ollama"
  # used during ingestion only to extract document metadata (author, title, date, tags)
  timeout: 120
  content_max_chars: 8000 # character limit sent to LLM; used if auto-detection fails
  auto_detect_context_limit: true
  context_utilization: 0.25 # fraction of model context window to use
  enabled: true
  max_retries: 3
  requests_per_minute: 5
  ollama:
    model: "llama3.2" # alternatives: "llama3.2:3b", "qwen2.5:7b"
    base_url: "http://localhost:11434"
  gemini:
    model: "gemini-2.5-flash"

vector_db:
  provider: "qdrant"
  host: "localhost" # use "qdrant" when running via Docker Compose
  port: 6333
  # for Qdrant Cloud, set url and api_key (via QDRANT_URL / QDRANT_API_KEY in .env)
  collection_name: "documents-gemini" # update when switching embedding providers
  distance_metric: "cosine" # options: "cosine", "euclidean", "dot"

logging:
  level: "INFO" # options: DEBUG, INFO, WARNING, ERROR
