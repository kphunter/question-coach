services:
  # FastAPI Backend
  # Runs with or without the knowledge-base stack (docker-compose.kb.yml).
  # When Qdrant/Ollama are not running, the API operates in direct mode —
  # chat requests go straight to Gemini using only the agent instructions.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rag-api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:?export GEMINI_API_KEY in your shell before running docker compose}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
      - SESSIONS_REPO_TOKEN=${SESSIONS_REPO_TOKEN:-}
      - SESSIONS_REPO=${SESSIONS_REPO:-}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-config.yaml:/app/ai-config.yaml:ro
      - ./agents:/app/agents:ro
      - ./inputs:/app/inputs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rag-network
    restart: unless-stopped

  # Vite dev server — local development only
  # Not used in production (frontend is deployed to GitHub Pages)
  frontend:
    image: node:20-alpine
    container_name: rag-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    networks:
      - rag-network
    depends_on:
      - api

  # Caddy — TLS termination and reverse proxy for the API
  # CADDY_HOST is set in .env on the server (e.g. 5-161-100-200.sslip.io)
  caddy:
    profiles: [production]
    image: caddy:2-alpine
    container_name: rag-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - CADDY_HOST=${CADDY_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
