services:
  # FastAPI Backend
  # Runs with or without the knowledge-base stack (docker-compose.kb.yml).
  # When Qdrant/Ollama are not running, the API operates in direct mode —
  # chat requests go straight to Gemini using only the agent instructions.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rag-api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:?export GEMINI_API_KEY in your shell before running docker compose}
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./ingestion-config.yaml:/app/ingestion-config.yaml:ro
      - ./agents:/app/agents:ro
      - ./inputs:/app/inputs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rag-network
    restart: unless-stopped

  # Frontend (React + Vite, served via Nginx)
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge
